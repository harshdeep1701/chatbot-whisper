<div class="chat-container">
  <!-- Messages Area -->
  <div class="messages" #messagesContainer>
    <div class="welcome" *ngIf="messages.length === 1">
      <div class="welcome-icon">
        <i class="fas fa-comment-dots"></i>
      </div>
      <h2>Cosmo-Chat</h2>
      <p>Ask me anything! I support both text and voice input.</p>
    </div>

    <div class="message-wrapper" *ngFor="let msg of messages" [class.user]="msg.role === 'user'" [class.system]="msg.role === 'system'">
      <div class="message" [class.user-message]="msg.role === 'user'" [class.bot-message]="msg.role !== 'user'">
        <div class="avatar" *ngIf="msg.role !== 'user'">
          <img src="assets/voice-chatbot-favicon.svg" alt="AI" class="bot-avatar-img" />
        </div>
        <div class="avatar user-avatar" *ngIf="msg.role === 'user'">
          <i class="fas fa-user"></i>
        </div>
        <div class="bubble" [class.user-bubble]="msg.role === 'user'">
          <div class="message-text" [innerHTML]="msg.content | markdown"></div>
          <div class="message-time">{{ msg.timestamp | date:'shortTime' }}</div>
        </div>
      </div>
    </div>

    <!-- Typing indicator -->
    <div class="message-wrapper" *ngIf="isLoading">
      <div class="message bot-message">
        <div class="avatar">
          <img src="assets/voice-chatbot-favicon.svg" alt="AI" class="bot-avatar-img" />
        </div>
        <div class="bubble typing">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- Input Area -->
  <div class="input-area">
    <div class="input-wrapper" [class.processing]="isTranscribing">
      <div class="processing-flash" *ngIf="isTranscribing">
        <i class="fas fa-circle-notch fa-spin"></i>
        <span>Processing voice input...</span>
      </div>
      <textarea
        [(ngModel)]="userInput"
        (keydown.enter)="$event.preventDefault(); sendMessage()"
        [placeholder]="isListening ? 'Listening...' : (isTranscribing ? 'Transcribing...' : 'Type your message...')"
        rows="1"
        class="message-input"
        [disabled]="isLoading"
      ></textarea>

      <div class="action-buttons">
        <!-- Quota Indicator -->
        <app-quota-indicator
          *ngIf="userId > 0"
          [userId]="userId"
          class="quota-btn"
        ></app-quota-indicator>

        <!-- Read Aloud Toggle -->
        <button
          class="action-btn read-aloud-btn"
          [class.active]="readAloudEnabled"
          (click)="toggleReadAloud()"
          [title]="readAloudEnabled ? 'Disable read aloud' : 'Enable read aloud'"
        >
          <i class="fas" [class.fa-volume-up]="readAloudEnabled" [class.fa-volume-mute]="!readAloudEnabled"></i>
        </button>

        <!-- Speak / Stop Speaking -->
        <button
          class="action-btn speak-btn"
          *ngIf="isSpeaking"
          (click)="stopSpeaking()"
          title="Stop speaking"
        >
          <i class="fas fa-volume-off"></i>
        </button>

        <!-- Voice Input -->
        <button
          class="action-btn mic-btn"
          [class.recording]="isListening || isTranscribing || audioRecorderService.getIsRecording()"
          [class.processing]="isTranscribing"
          (click)="toggleVoiceInput()"
          [title]="audioRecorderService.getIsRecording() ? 'Stop recording' : (isListening ? 'Stop listening' : (isTranscribing ? 'Transcribing...' : 'Click to record voice'))"
        >
          <i class="fas" [class.fa-microphone]="!isTranscribing && !audioRecorderService.getIsRecording()" [class.fa-circle]="audioRecorderService.getIsRecording()" [class.fa-spinner]="isTranscribing" [class.fa-spin]="isTranscribing"></i>
        </button>

        <!-- Send -->
        <button
          class="action-btn send-btn"
          (click)="sendMessage()"
          [disabled]="!userInput.trim() || isLoading"
          title="Send message"
        >
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
    </div>
  </div>
</div>
