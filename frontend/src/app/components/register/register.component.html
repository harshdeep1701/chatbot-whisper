<div class="auth-container">
  <div class="deco-circle"></div>
  <div class="auth-card mat-card-elevated">
    <div class="auth-header">
      <div class="logo">
        <img src="assets/chatbot-logo.png" alt="Cosmo-Chat" />
      </div>
      <h1>Cosmo-Chat</h1>
      <p class="subtitle">Create a new account to get started.</p>
    </div>

    <form (ngSubmit)="register()" class="auth-form">
      <div class="form-group">
        <label for="username">Username</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Choose a username"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <div class="input-wrapper">
          <i class="fas fa-envelope input-icon"></i>
          <input
            id="email"
            type="email"
            [(ngModel)]="email"
            name="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="At least 6 characters"
            required
            autocomplete="new-password"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input
            id="confirmPassword"
            type="password"
            [(ngModel)]="confirmPassword"
            name="confirmPassword"
            placeholder="Repeat your password"
            required
            autocomplete="new-password"
          />
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="isLoading">
        <i class="fas" [class.fa-spinner]="isLoading" [class.fa-sparkles]="!isLoading" [class.spinning]="isLoading"></i>
        {{ isLoading ? 'Creating account...' : 'Create Account' }}
      </button>
    </form>

    <div class="auth-footer">
      <span>Already have an account?</span>
      <a routerLink="/login">Sign in</a>
    </div>
  </div>
</div>
