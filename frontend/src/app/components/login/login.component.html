<div class="auth-container">
  <div class="deco-circle"></div>
  <div class="auth-card mat-card-elevated">
    <div class="auth-header">
      <div class="logo">
        <img src="assets/chatbot-logo.png" alt="Cosmo-Chat" />
      </div>
      <h1>Cosmo-Chat</h1>
      <p class="subtitle">Welcome back! Sign in to continue.</p>
    </div>

    <form (ngSubmit)="login()" class="auth-form">
      <div class="form-group">
        <label for="username">Username or Email</label>
        <div class="input-wrapper">
          <i class="fas fa-user input-icon"></i>
          <input
            id="username"
            type="text"
            [(ngModel)]="username"
            name="username"
            placeholder="Enter your username or email"
            required
            autocomplete="username"
          />
        </div>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <div class="input-wrapper">
          <i class="fas fa-lock input-icon"></i>
          <input
            id="password"
            type="password"
            [(ngModel)]="password"
            name="password"
            placeholder="Enter your password"
            required
            autocomplete="current-password"
          />
        </div>
      </div>

      <div class="error-message" *ngIf="error">
        <i class="fas fa-exclamation-circle"></i>
        {{ error }}
      </div>

      <button type="submit" class="auth-btn" [disabled]="isLoading">
        <i class="fas" [class.fa-spinner]="isLoading" [class.fa-sparkles]="!isLoading" [class.spinning]="isLoading"></i>
        {{ isLoading ? 'Signing in...' : 'Sign In' }}
      </button>
    </form>

    <div class="auth-footer">
      <span>Don't have an account?</span>
      <a routerLink="/register">Create one</a>
    </div>
  </div>
</div>
