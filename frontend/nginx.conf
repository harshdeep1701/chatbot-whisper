# ============================================================
# Nginx configuration for Cosmo-Chat
# Serves the Angular frontend and proxies /api to the backend.
#
# ── Domain setup ──
# Replace YOUR_DOMAIN.COM with your actual domain, then run
# Certbot to enable HTTPS:
#
#   sudo certbot --nginx -d YOUR_DOMAIN.COM
#
# ============================================================
upstream backend {
    server backend:8080;
}

server {
    listen 80;
    server_name ${DOMAIN_NAME};

    # ── Security headers ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Gzip compression ──
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # ── Serve Angular static files ──
    root /usr/share/nginx/html;
    index index.html;

    # Cache static assets
    location ~* \.(?:ico|svg|css|js|woff2?|ttf|png|jpg|jpeg|gif|webp)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ── SPA routing — fall back to index.html ──
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy to backend ──
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 30s;
    }
}
